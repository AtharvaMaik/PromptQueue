name: Publish

on:
  workflow_dispatch:

jobs:
  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/promptqueue/
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Check PyPI version
        id: pypi
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import urllib.error
          import urllib.request

          with open("pyproject.toml", encoding="utf-8") as fp:
              pyproject = fp.read()

          project = pyproject.split("[project]", 1)[1].split("\n[", 1)[0]
          name = re.search(r'(?m)^name\s*=\s*"([^"]+)"', project).group(1)
          version = re.search(r'(?m)^version\s*=\s*"([^"]+)"', project).group(1)

          try:
              with urllib.request.urlopen(f"https://pypi.org/pypi/{name}/json") as response:
                  exists = version in json.load(response)["releases"]
          except urllib.error.HTTPError as exc:
              if exc.code != 404:
                  raise
              exists = False

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fp:
              fp.write(f"exists={'true' if exists else 'false'}\n")

          if exists:
              print(f"{name} {version} already exists on PyPI; skipping upload.")
          PY
      - name: Build
        if: steps.pypi.outputs.exists != 'true'
        run: |
          python -m pip install build
          python -m build
      - name: Publish
        if: steps.pypi.outputs.exists != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
