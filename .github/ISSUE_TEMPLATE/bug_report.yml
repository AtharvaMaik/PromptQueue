name: Bug report
description: Report something that failed or behaved unexpectedly.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Tell us what you expected and what happened instead.
    validations:
      required: true
  - type: input
    id: command
    attributes:
      label: Command
      description: The exact command you ran.
      placeholder: python promptqueue.py add 23:30 claude hello
    validations:
      required: true
  - type: input
    id: target
    attributes:
      label: Target
      placeholder: claude, codex, cursor, copy, etc.
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: Windows 11, macOS, Linux
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: python --version
  - type: textarea
    id: output
    attributes:
      label: Output
      description: Paste relevant terminal output. Remove secrets and private prompt text.
      render: text
  - type: textarea
    id: targets
    attributes:
      label: Target status
      description: If launch failed, paste output from `python promptqueue.py targets`.
      render: text
